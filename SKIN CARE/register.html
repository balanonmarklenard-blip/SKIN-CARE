<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Recella's Skincare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><h1>Recella's</h1></div>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2>Create Account</h2>
            <form id="reg-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required placeholder="yourname@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-pass" required placeholder="Min. 8 characters">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Register Now</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Already have an account? <span class="link-p" onclick="window.location.href='login.html'">Login here</span>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('reg-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            UserSession.register(email, pass);
        });
    </script>
</body>
</html>
