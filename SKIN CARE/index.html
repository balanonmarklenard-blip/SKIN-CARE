<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop | Recella's Skincare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container header-flex">
            <div class="logo"><h1>Recella's</h1></div>
            <nav>
                <ul>
                    <li><a href="index.html">Shop</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li id="nav-admin" style="display:none;"><a href="admin.html">Admin</a></li>
                    <li><span class="link-p" onclick="UserSession.logout()">Logout</span></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="hero-banner"><h2>Premium Glow</h2></div>

        <div class="filter-bar">
            <div>
                <button class="btn-filter" onclick="renderShop('All')">All</button>
                <button class="btn-filter" onclick="renderShop('Cleanser')">Cleansers</button>
                <button class="btn-filter" onclick="renderShop('Serum')">Serums</button>
                <button class="btn-filter" onclick="renderShop('Moisturizer')">Creams</button>
                <button class="btn-filter" onclick="renderShop('Sunscreen')">Sunscreen</button>
            </div>
            <button class="refresh-icon-btn" onclick="location.reload()" title="Refresh Shop">↻ Refresh Shop</button>
        </div>

        <div id="product-grid" class="product-grid"></div>
    </main>

    <script src="script.js"></script>
    <script>renderShop('All'); checkAdminNav();</script>
</body>
</html>
