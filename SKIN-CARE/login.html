<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Recella's Skincare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><h1>Recella's</h1></div>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2>Sign In</h2>
            <form id="log-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="log-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="log-pass" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>
            <div style="margin-top: 20px; font-size: 0.8rem; color: #999; text-align: center;">
                <p>Admin Login: <b>admin@recella.com</b> | Pass: <b>admin123</b></p>
            </div>
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <span class="link-p" onclick="window.location.href='register.html'">Register here</span>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('log-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;
            UserSession.login(email, pass);
        });
    </script>
</body>
</html>
